version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - API_HOST=http://localhost:3000
    container_name: myb-client
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: production
    restart: unless-stopped

networks:
  default:
    name: myb-client-network
